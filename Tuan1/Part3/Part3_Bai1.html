<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Test Data</h2>
    <p>Data 1: [17, 21, 23]</p>
    <p>Data 2: [12, 5, -5, 0, 4]</p>

    <script>
        var temp1 = [17, 21, 23];
        var temp2 = [12, 5, -5, 0, 4];

        printForecast(temp1);
        console.log("");
        printForecast(temp2);

        function printForecast(arr) {
            for (i = 0; i < arr.length; i++) {
                console.log("..." + arr[i] + "ºC in " + (i+1) + " days");
            }
        }
    </script>
</body>
</html>
