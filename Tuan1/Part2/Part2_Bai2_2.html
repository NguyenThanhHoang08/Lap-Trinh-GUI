<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <p>Bills: 125, 555, 44</p>
        <button onclick="action()">Calculate</button>
    </div>

    <script>
        function action() {
            var bill = [125, 555, 44];
            var tip = [];
            for (i = 0; i < bill.length; i++) {            
                tip[i] = calcTip(bill[i]);
            }

            console.log(bill);
            console.log("The tips are:");
            console.log(tip);
        }

        function calcTip(billAmount) {
            var tip = billAmount < 50 || billAmount > 300 ? 
                billAmount * 0.2 : billAmount * 0.15;
            
            return tip;
        }
    </script>
</body>
</html>
