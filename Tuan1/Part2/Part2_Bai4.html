<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <p>Bills: 22, 295, 176, 440, 37, 105, 10, 1100, 86 and 52 </p>
        <button onclick="action()">Calculate</button>
    </div>

    <script>
        function action() {
            var bill = [22, 295, 176, 440, 37, 105, 10, 1100, 86, 52];
            var tip = [];
            var total = [];
            for (i = 0; i < bill.length; i++) {            
                tip.push(calcTip(bill[i]));
                total.push(tip[i] + bill[i]);
            }

            console.log(bill);
            console.log("The tips are:");
            console.log(tip);
            console.log("The totals are:");
            console.log(total);
            console.log("The mean of the bills");
            console.log(calcAverage(total));
        }

        function calcTip(billAmount) {
            var tip = billAmount < 50 || billAmount > 300 ? 
                billAmount * 0.2 : billAmount * 0.15;
            
            return tip;
        }

        function calcAverage(arr) {
            var sum = 0;
            for (i = 0; i < arr.length; i++) {            
                sum += arr[i];
            }
            return sum/(arr.length++);
        }
    </script>
</body>
</html>
